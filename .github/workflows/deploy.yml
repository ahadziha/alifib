name: Deploy web interface to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "web/wasm -> target"

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        # --out-dir is relative to the crate dir, so ../frontend/pkg lands in web/frontend/pkg/
        run: wasm-pack build --target web --release web/wasm --out-dir ../frontend/pkg

      - name: Assemble dist/
        # - web/frontend/pkg/ was produced above by wasm-pack
        # - examples/ is mirrored into dist/examples/ and paired with an
        #   index.json manifest; the frontend fetches these at runtime via
        #   the same /examples/... URLs the HTTP server exposes locally
        run: |
          mkdir -p dist
          cp -r web/frontend/. dist/
          mkdir -p dist/examples
          cp examples/*.ali dist/examples/
          python3 -c "import json, os; \
            names = sorted(os.path.splitext(f)[0] for f in os.listdir('dist/examples') if f.endswith('.ali')); \
            open('dist/examples/index.json','w').write(json.dumps(names))"

      - name: Upload Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
