name: Deploy web interface to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "web/wasm -> target"

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend JS
        run: cd web/frontend && npm ci && npm run build

      - name: Build WASM
        # --out-dir is relative to the crate dir, so ../frontend/pkg lands in web/frontend/pkg/
        run: wasm-pack build --target web --release web/wasm --out-dir ../frontend/pkg

      - name: Assemble dist/
        # - web/frontend/pkg/ was produced above by wasm-pack
        # - examples/ is mirrored recursively (preserving subdirectory
        #   structure) via the shared build script, which also writes
        #   index.json and fails the build on duplicate stems
        run: |
          mkdir -p dist
          cp -r web/frontend/. dist/
          python3 scripts/build_examples_manifest.py examples dist/examples

      - name: Upload Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
